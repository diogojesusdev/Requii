name: Manual Release Builds

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        default: main
        type: string
      artifact_set:
        description: Which artifact set to build on each selected platform
        required: true
        default: full
        type: choice
        options:
          - full
          - installer
          - portable
      build_windows:
        description: Build Windows artifacts
        required: true
        default: true
        type: boolean
      build_macos:
        description: Build macOS artifacts
        required: true
        default: true
        type: boolean
      build_linux:
        description: Build Linux artifacts
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows / ${{ inputs.artifact_set }}
    runs-on: windows-latest
    if: ${{ inputs.build_windows }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build full Windows release artifacts
        if: ${{ inputs.artifact_set == 'full' }}
        shell: pwsh
        run: npm run dist:win

      - name: Build installable Windows release artifacts
        if: ${{ inputs.artifact_set == 'installer' }}
        shell: pwsh
        run: npm run dist:win:installer

      - name: Build portable Windows release artifacts
        if: ${{ inputs.artifact_set == 'portable' }}
        shell: pwsh
        run: npm run dist:win:portable

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: requii-windows-${{ inputs.artifact_set }}
          path: |
            release/**/*
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: macOS / ${{ inputs.artifact_set }}
    runs-on: macos-latest
    if: ${{ inputs.build_macos }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build full macOS release artifacts
        if: ${{ inputs.artifact_set == 'full' }}
        run: npm run dist:mac

      - name: Build installable macOS release artifacts
        if: ${{ inputs.artifact_set == 'installer' }}
        run: npm run dist:mac:installer

      - name: Build portable macOS release artifacts
        if: ${{ inputs.artifact_set == 'portable' }}
        run: npm run dist:mac:portable

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: requii-macos-${{ inputs.artifact_set }}
          path: |
            release/**/*
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Linux / ${{ inputs.artifact_set }}
    runs-on: ubuntu-latest
    if: ${{ inputs.build_linux }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build full Linux release artifacts
        if: ${{ inputs.artifact_set == 'full' }}
        run: npm run dist:linux

      - name: Build installable Linux release artifacts
        if: ${{ inputs.artifact_set == 'installer' }}
        run: npm run dist:linux:installer

      - name: Build portable Linux release artifacts
        if: ${{ inputs.artifact_set == 'portable' }}
        run: npm run dist:linux:portable

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: requii-linux-${{ inputs.artifact_set }}
          path: |
            release/**/*
          if-no-files-found: error
          retention-days: 14
